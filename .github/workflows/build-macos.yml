name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build AgentQT.dmg
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PySide6>=6.8.0.2" pyinstaller

      - name: Compile check
        run: python -m py_compile agent_qt.py

      - name: Build app bundle
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name AgentQT \
            --add-data "plugins:plugins" \
            agent_qt.py

      - name: Prepare DMG
        run: |
          mkdir -p release
          cp -R dist/AgentQT.app release/AgentQT.app
          cp README.md release/README.md
          cp LICENSE release/LICENSE
          cat > release/MACOS-README.txt <<'EOF'
          AgentQT macOS 测试版

          运行方式：
          1. 打开 DMG。
          2. 将 AgentQT.app 拖到 Applications，或直接双击运行。
          3. 如果 macOS Gatekeeper 阻止打开，请在系统设置的“隐私与安全性”中允许打开。
          4. 首次使用自动化插件或 Agent Python 环境时，在设置里点击对应安装按钮。

          说明：
          - 这是未签名测试构建。
          - 自动化 provider 源码已随 app 打包。
          EOF
          hdiutil create \
            -volname "AgentQT" \
            -srcfolder release \
            -ov \
            -format UDZO \
            AgentQT-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentQT-macOS
          path: AgentQT-macOS.dmg
          if-no-files-found: error
